<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Farsan&family=Nunito:wght@300;400;500;600&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Glass Website</title>
</head>
<body>
    <main>
        <section class="glass">
            <div class="dashboard">
                <div class="user">
                    <img src="./Images/avatar.jpeg" alt="">
                    <h3>Otima Ortiz</h3>
                    <p>Amateur Player</p>
                </div>
                <div class="links">
                    <div class="link">
                        <img src="./Images/stream.png" alt="">
                        <h2>Streams</h2>
                    </div>
                    <div class="link">
                        <img src="./Images/games.jpg" alt="">
                        <h2>Games</h2>
                    </div>
                    <div class="link">
                        <img src="./Images/new.png" alt="">
                        <h2>New</h2>
                    </div>
                    <div class="link">
                        <img src="./Images/library.png" alt="">
                        <h2>Library</h2>
                    </div>
                </div>
                <div class="pro">
                    <h2>Join pro for unlimited access</h2>
                    <img src="./Images/controller.png" alt="">
                </div>
            </div>
            <div class="games">
                <div class="status">
                    <h1>Active Games</h1>
                    <input type="text">
                </div>
                <div class="cards">
                    <div class="card">
                        <img src="./Images/witcher.jpg" alt="">
                        <div class="card-info">
                            <h2>The Witcher 3: Wild Hunt</h2>
                            <p>Xbox Version</p>
                            <div class="progress"></div>
                        </div>
                        <h2 class="percentage">60%</h2>
                    </div>
                    <div class="card">
                        <img src="./Images/red dead.jpg" alt="">
                        <div class="card-info">
                            <h2>Red Dead Redemption 2</h2>
                            <p>PS5 Version</p>
                            <div class="progress"></div>
                        </div>
                        <h2 class="percentage">60%</h2>
                    </div>
                    <div class="card">
                        <img src="./Images/Assasin.jpg" alt="">
                        <div class="card-info">
                            <h2>Assassins Creed Valhalla</h2>
                            <p>Xbox Version</p>
                            <div class="progress"></div>
                        </div>
                        <h2 class="percentage">60%</h2>
                    </div>
                    
                </div>
            </div>

        </section>
    </main>
    <div class="circleA"></div>
    <div class="circleB"></div>
</body>
</html>
